name: CI

on:
  push:
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo Check
        run: cargo check --verbose

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Enforce formatting
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Linting
        run: cargo clippy --all-targets -- -D warnings

  size-budget:
    name: Size Budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # Hard limit on file length — fails the job on any `src/**/*.rs` file
      # larger than the 500-line CLAUDE.md budget.
      - name: File-length budget (<= 500 lines / src/**/*.rs)
        run: |
          set -euo pipefail
          offenders=$(find src -name '*.rs' -exec wc -l {} \; | awk '$1 > 500 {print}')
          if [ -n "$offenders" ]; then
              echo "Files exceed the 500-line budget:"
              echo "$offenders"
              exit 1
          fi
          echo "All files within the 500-line budget."
      # Function-length budget: warn (not deny) today so existing over-budget
      # functions can be tightened incrementally. The 80-line threshold is
      # enforced via `too-many-lines-threshold = 80` in `clippy.toml`.
      - name: Function-length budget (warn, threshold 80)
        run: cargo clippy --all-targets -- -W clippy::too_many_lines
      # Guardrail for CLAUDE.md "bind 127.0.0.1:0, never hard-code" — fails
      # if any hard-coded non-zero port literal reappears in tests/*.rs.
      - name: No hard-coded test ports
        run: scripts/check-no-hardcoded-ports.sh

  test-release:
    name: Test (Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests in release mode
        run: cargo test --release --verbose

  test-matrix:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --all-targets

  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check docs build
        run: cargo doc --no-deps --all-features
      - name: Check missing docs (deny)
        run: RUSTDOCFLAGS="-D missing_docs" cargo doc --no-deps --all-features
      - name: Check for broken intra-doc links
        run: |
          cargo rustdoc --lib -- -D rustdoc::broken_intra_doc_links

  link-check:
    name: Markdown Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `lychee` catches broken http(s) links in README, CHANGELOG, and any
      # other markdown file. Intra-doc links inside the Rust source are
      # covered separately by the `docs-check` job above.
      #
      # `--accept 200..=299,429,500..=504` tolerates transient upstream
      # infra errors (GitHub returning 502 on release pages, etc.) without
      # masking genuinely-broken links — 4xx (other than rate-limit 429)
      # still fails the build. `--max-retries 5 --retry-wait-time 3` gives
      # lychee enough room to ride out short outages before giving up.
      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --exclude-path target
            --max-retries 5
            --retry-wait-time 3
            --accept 200..=299,429,500..=504
            './**/*.md'
          fail: true

  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Benches microbenchmark internal algorithms that aren't part of the
      # public API, so they require the dev-only `_internal` feature which
      # exposes `routing`, `router`, `filter`, and `mavlink_utils` as `pub`.
      - name: Run benchmarks
        run: cargo bench --features _internal --bench routing_benchmark
      - name: Check for regression (Basic)
        run: |
          # Verify benchmarks compile and run.
          cargo bench --features _internal --bench routing_benchmark -- --test
          cargo bench --features _internal --bench fanout_bench -- --test
          cargo bench --features _internal --bench filter_bench -- --test
          cargo bench --features _internal --bench clone_benchmark -- --test
          cargo bench --features _internal --bench routing_contention_bench -- --test
          cargo bench --features _internal --bench pipeline_benchmark -- --test
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion/

  python-tests:
    name: Python Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/integration/requirements.txt
      - name: Build router
        run: cargo build --release
      - name: Run router in background
        run: |
          # Create minimal test config
          mkdir -p logs
          # Claim ephemeral TCP/UDP ports the same way the Rust tests do —
          # bind on 127.0.0.1:0, read the kernel-assigned port, close the
          # throwaway socket. Exported to $GITHUB_ENV so the Python client
          # scripts (verify_udp.py, stress_test.py, etc.) can connect via
          # MAVROUTER_TCP_PORT / MAVROUTER_UDP_PORT. Stops two concurrent
          # CI runs on the same GitHub runner host from colliding on
          # 5760 / 14550.
          TCP_PORT=$(python3 -c "import socket; s=socket.socket(); s.bind(('127.0.0.1',0)); p=s.getsockname()[1]; s.close(); print(p)")
          UDP_PORT=$(python3 -c "import socket; s=socket.socket(socket.AF_INET, socket.SOCK_DGRAM); s.bind(('127.0.0.1',0)); p=s.getsockname()[1]; s.close(); print(p)")
          echo "MAVROUTER_TCP_PORT=$TCP_PORT" >> "$GITHUB_ENV"
          echo "MAVROUTER_UDP_PORT=$UDP_PORT" >> "$GITHUB_ENV"
          cat > ci_config.toml << EOF
          [general]
          bus_capacity = 5000
          tcp_port = $TCP_PORT
          log = "logs"
          log_telemetry = true

          [[endpoint]]
          type = "udp"
          address = "127.0.0.1:$UDP_PORT"
          mode = "server"
          EOF
          # Start router in background
          ./target/release/mavrouter --config ci_config.toml > router.log 2>&1 &
          echo $! > router.pid
          # Wait for router to start
          sleep 2
      - name: Run Python verification
        run: |
          cd tests/integration
          set -e
          echo "Running Python integration tests..."
          # Note: fuzz_test.py and chaos_test.py require hardware and are only run in full_hw_validation.sh
          # verify_sighup.py is Unix-only (skips itself on Windows)
          for test in verify_udp.py stress_test.py verify_multiclient.py loop_stress_test.py verify_sighup.py; do
            echo "Running $test..."
            timeout 120 python3 "$test"
          done
        continue-on-error: false
      - name: Stop router
        if: always()
        run: |
          if [ -f router.pid ]; then
            kill $(cat router.pid) || true
            rm router.pid
          fi
      - name: Run self-managed Python tests
        if: runner.os == 'Linux'
        run: |
          set -e
          echo "Running self-managed Python integration tests..."
          for test in verify_config_dir.py verify_endpoint_stats.py verify_filtering.py; do
            echo "Running $test..."
            timeout 120 python3 "tests/integration/$test"
          done
        continue-on-error: false
      - name: Upload router logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-logs
          path: |
            router.log
            logs/

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin
      - name: Generate coverage report
        run: cargo tarpaulin --out Xml --out Json
      - name: Check minimum coverage
        run: |
          # Extract coverage from tarpaulin JSON output file
          COVERAGE=$(jq '.coverage' tarpaulin-report.json)
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 40" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below 40% threshold"
            exit 1
          fi
          echo "✅ Coverage $COVERAGE% meets minimum requirement"
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
